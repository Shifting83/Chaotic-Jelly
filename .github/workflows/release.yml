name: Auto Version & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'version.json'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (auto, patch, minor, major)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  SCHEME: ChaoticJelly
  PROJECT_DIR: ChaoticJelly

jobs:
  version-and-release:
    name: Version, Build & Release
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: version
        run: |
          CURRENT=$(jq -r '.version' version.json)
          BUILD=$(jq -r '.build' version.json)
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "current_build=$BUILD" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since $LAST_TAG — skipping release"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          MANUAL_BUMP="${{ inputs.bump_type }}"
          if [ -n "$MANUAL_BUMP" ] && [ "$MANUAL_BUMP" != "auto" ]; then
            BUMP="$MANUAL_BUMP"
          else
            BUMP="patch"
            if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|.*!:)"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
              BUMP="minor"
            fi
          fi

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_BUILD=$((BUILD + 1))

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version bump: $CURRENT -> $NEW_VERSION ($BUMP), build $BUILD -> $NEW_BUILD"

      - name: Check for existing tag
        if: steps.version.outputs.skip != 'true'
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version.json
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          jq --arg v "${{ steps.version.outputs.new_version }}" \
             --argjson b ${{ steps.version.outputs.new_build }} \
             '.version = $v | .build = $b' version.json > version.tmp \
            && mv version.tmp version.json
          cat version.json

      - name: Update project.yml version
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          BUILD="${{ steps.version.outputs.new_build }}"
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"$VERSION\"/" "$PROJECT_DIR/project.yml"
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD/" "$PROJECT_DIR/project.yml"
          sed -i '' "s/CFBundleShortVersionString: .*/CFBundleShortVersionString: \"$VERSION\"/" "$PROJECT_DIR/project.yml"
          sed -i '' "s/CFBundleVersion: .*/CFBundleVersion: \"$BUILD\"/" "$PROJECT_DIR/project.yml"

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${{ steps.version.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="- %s (%h)")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="- %s (%h)")
          fi

          {
            echo "## What's Changed in v${VERSION}"
            echo ""
            echo "$COMMITS"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${VERSION}"
            else
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/v${VERSION}"
            fi
          } > release_notes.md

          cat release_notes.md

          echo "" >> CHANGELOG.md
          echo "## [${VERSION}] - ${DATE}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Changes" >> CHANGELOG.md
          echo "$COMMITS" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "[${VERSION}]: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" >> CHANGELOG.md

      - name: Install XcodeGen
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: brew install xcodegen

      - name: Generate Xcode Project
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Select Xcode
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Archive
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true
        run: |
          xcodebuild \
            -project ChaoticJelly.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath build/ChaoticJelly.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.new_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.new_build }}"

      - name: Create DMG
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          brew install create-dmg 2>/dev/null || true
          APP_PATH="${PROJECT_DIR}/build/ChaoticJelly.xcarchive/Products/Applications"
          DMG_NAME="ChaoticJelly-${{ steps.version.outputs.tag }}.dmg"
          if [ -d "$APP_PATH" ]; then
            create-dmg \
              --volname "Chaotic Jelly ${{ steps.version.outputs.new_version }}" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --app-drop-link 400 190 \
              "$DMG_NAME" \
              "$APP_PATH" || echo "DMG creation completed with warnings"
          else
            echo "App archive not found — creating placeholder"
            echo "Build artifact placeholder" > "$DMG_NAME.txt"
          fi

      - name: Commit version bump
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json CHANGELOG.md "$PROJECT_DIR/project.yml"
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Create tag
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Chaotic Jelly ${{ steps.version.outputs.new_version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.new_version, '-') }}
          files: |
            *.dmg
            *.dmg.txt
          generate_release_notes: false

      - name: Upload build artifact
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ChaoticJelly-${{ steps.version.outputs.tag }}
          path: |
            *.dmg
            release_notes.md
