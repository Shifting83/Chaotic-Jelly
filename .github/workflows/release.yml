name: Auto Version & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'version.json'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (auto, patch, minor, major)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  SCHEME: ChaoticJelly
  PROJECT_DIR: ChaoticJelly

jobs:
  version-and-release:
    name: Version, Build & Release
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: version
        run: |
          CURRENT=$(jq -r '.version' version.json)
          BUILD=$(jq -r '.build' version.json)
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "current_build=$BUILD" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since $LAST_TAG — skipping release"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          MANUAL_BUMP="${{ inputs.bump_type }}"
          if [ -n "$MANUAL_BUMP" ] && [ "$MANUAL_BUMP" != "auto" ]; then
            BUMP="$MANUAL_BUMP"
          else
            BUMP="patch"
            if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|.*!:)"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
              BUMP="minor"
            fi
          fi

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_BUILD=$((BUILD + 1))

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version bump: $CURRENT -> $NEW_VERSION ($BUMP), build $BUILD -> $NEW_BUILD"

      - name: Check for existing tag
        if: steps.version.outputs.skip != 'true'
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version.json
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          jq --arg v "${{ steps.version.outputs.new_version }}" \
             --argjson b ${{ steps.version.outputs.new_build }} \
             '.version = $v | .build = $b' version.json > version.tmp \
            && mv version.tmp version.json
          cat version.json

      - name: Update project.yml version
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          BUILD="${{ steps.version.outputs.new_build }}"
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"$VERSION\"/" "$PROJECT_DIR/project.yml"
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD/" "$PROJECT_DIR/project.yml"
          sed -i '' "s/CFBundleShortVersionString: .*/CFBundleShortVersionString: \"$VERSION\"/" "$PROJECT_DIR/project.yml"
          sed -i '' "s/CFBundleVersion: .*/CFBundleVersion: \"$BUILD\"/" "$PROJECT_DIR/project.yml"

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${{ steps.version.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="- %s (%h)")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="- %s (%h)")
          fi

          {
            echo "## What's Changed in v${VERSION}"
            echo ""
            echo "$COMMITS"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${VERSION}"
            else
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/v${VERSION}"
            fi
          } > release_notes.md

          cat release_notes.md

          echo "" >> CHANGELOG.md
          echo "## [${VERSION}] - ${DATE}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Changes" >> CHANGELOG.md
          echo "$COMMITS" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "[${VERSION}]: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" >> CHANGELOG.md

      # ── Import Developer ID Certificate ──
      - name: Import signing certificate
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify certificate was imported
          echo "Installed certificates:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ── Build ──
      - name: Install XcodeGen
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: brew install xcodegen

      - name: Generate Xcode Project
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Select Xcode
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Build
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcodebuild \
            -project ChaoticJelly.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            MARKETING_VERSION="${{ steps.version.outputs.new_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.new_build }}"

      # ── Sign & Package ──
      - name: Generate AppIcon.icns
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          # Build .icns from asset catalog PNGs so the app icon is guaranteed
          # to be present even if the asset catalog compiler skips it.
          ICONSET="$RUNNER_TEMP/AppIcon.iconset"
          mkdir -p "$ICONSET"
          SRC="$PROJECT_DIR/Resources/Assets.xcassets/AppIcon.appiconset"
          cp "$SRC/icon_16x16.png"      "$ICONSET/icon_16x16.png"
          cp "$SRC/icon_16x16@2x.png"   "$ICONSET/icon_16x16@2x.png"
          cp "$SRC/icon_32x32.png"      "$ICONSET/icon_32x32.png"
          cp "$SRC/icon_32x32@2x.png"   "$ICONSET/icon_32x32@2x.png"
          cp "$SRC/icon_128x128.png"    "$ICONSET/icon_128x128.png"
          cp "$SRC/icon_128x128@2x.png" "$ICONSET/icon_128x128@2x.png"
          cp "$SRC/icon_256x256.png"    "$ICONSET/icon_256x256.png"
          cp "$SRC/icon_256x256@2x.png" "$ICONSET/icon_256x256@2x.png"
          cp "$SRC/icon_512x512.png"    "$ICONSET/icon_512x512.png"
          cp "$SRC/icon_512x512@2x.png" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o "$RUNNER_TEMP/AppIcon.icns"
          echo "Generated AppIcon.icns ($(wc -c < "$RUNNER_TEMP/AppIcon.icns") bytes)"

      - name: Package and sign app
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          APP_SRC=$(find "$PROJECT_DIR/build/DerivedData" -name "Chaotic Jelly.app" -type d | head -1)
          echo "Found app at: $APP_SRC"

          if [ -z "$APP_SRC" ]; then
            echo "ERROR: .app not found"
            find "$PROJECT_DIR/build" -name "*.app" -type d
            exit 1
          fi

          mkdir -p "$PROJECT_DIR/build/Release"
          cp -R "$APP_SRC" "$PROJECT_DIR/build/Release/Chaotic Jelly.app"

          # Inject the .icns into the app bundle in case asset catalog didn't compile it
          RESOURCES_DIR="$PROJECT_DIR/build/Release/Chaotic Jelly.app/Contents/Resources"
          cp "$RUNNER_TEMP/AppIcon.icns" "$RESOURCES_DIR/AppIcon.icns"
          echo "Injected AppIcon.icns into app bundle"

          # Verify icon is present
          if [ -f "$RESOURCES_DIR/AppIcon.icns" ]; then
            echo "AppIcon.icns confirmed in bundle ($(wc -c < "$RESOURCES_DIR/AppIcon.icns") bytes)"
          else
            echo "WARNING: AppIcon.icns missing from bundle!"
          fi

          # Sign with Developer ID (deep sign all frameworks/helpers)
          codesign --force --deep --options runtime \
            --sign "Developer ID Application" \
            "$PROJECT_DIR/build/Release/Chaotic Jelly.app"

          echo "Signature details:"
          codesign -dv --verbose=4 "$PROJECT_DIR/build/Release/Chaotic Jelly.app" 2>&1 || true

      # ── Notarize ──
      - name: Notarize app
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          APP_PATH="$PROJECT_DIR/build/Release/Chaotic Jelly.app"

          # Create ZIP for notarization submission
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/ChaoticJelly.zip"

          # Submit for notarization
          echo "Submitting for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/ChaoticJelly.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 600

          # Staple the notarization ticket to the app
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"

          echo "Notarization complete"

      # ── Create DMG ──
      - name: Generate volume icon
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          # Build .icns from the app icon PNGs for the DMG volume icon
          ICONSET_DIR="$RUNNER_TEMP/ChaoticJelly.iconset"
          mkdir -p "$ICONSET_DIR"
          SRC="$PROJECT_DIR/Resources/Assets.xcassets/AppIcon.appiconset"
          cp "$SRC/icon_16x16.png"      "$ICONSET_DIR/icon_16x16.png"
          cp "$SRC/icon_16x16@2x.png"   "$ICONSET_DIR/icon_16x16@2x.png"
          cp "$SRC/icon_32x32.png"      "$ICONSET_DIR/icon_32x32.png"
          cp "$SRC/icon_32x32@2x.png"   "$ICONSET_DIR/icon_32x32@2x.png"
          cp "$SRC/icon_128x128.png"    "$ICONSET_DIR/icon_128x128.png"
          cp "$SRC/icon_128x128@2x.png" "$ICONSET_DIR/icon_128x128@2x.png"
          cp "$SRC/icon_256x256.png"    "$ICONSET_DIR/icon_256x256.png"
          cp "$SRC/icon_256x256@2x.png" "$ICONSET_DIR/icon_256x256@2x.png"
          cp "$SRC/icon_512x512.png"    "$ICONSET_DIR/icon_512x512.png"
          cp "$SRC/icon_512x512@2x.png" "$ICONSET_DIR/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o "$RUNNER_TEMP/VolumeIcon.icns"

      - name: Create DMG
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          brew install create-dmg 2>/dev/null || true
          DMG_NAME="ChaoticJelly-${{ steps.version.outputs.tag }}.dmg"

          create-dmg \
            --volname "Chaotic Jelly ${{ steps.version.outputs.new_version }}" \
            --volicon "$RUNNER_TEMP/VolumeIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Chaotic Jelly.app" 175 190 \
            --app-drop-link 425 190 \
            "$DMG_NAME" \
            "$PROJECT_DIR/build/Release" || echo "DMG creation completed with warnings"

          # Sign the DMG too
          codesign --force --sign "Developer ID Application" "$DMG_NAME" || echo "DMG signing skipped"

          ls -la *.dmg

      # ── Commit & Release ──
      - name: Commit version bump
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json CHANGELOG.md "$PROJECT_DIR/project.yml"
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Create tag
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Chaotic Jelly ${{ steps.version.outputs.new_version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.new_version, '-') }}
          files: |
            *.dmg
          generate_release_notes: false

      - name: Upload build artifact
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ChaoticJelly-${{ steps.version.outputs.tag }}
          path: |
            *.dmg
            release_notes.md

      # ── Cleanup ──
      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f $RUNNER_TEMP/certificate.p12 $RUNNER_TEMP/ChaoticJelly.zip
