name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  SCHEME: ChaoticJelly
  PROJECT_DIR: ChaoticJelly

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild \
            -project ChaoticJelly.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath build/ChaoticJelly.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ChaoticJelly.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            || echo "Export step skipped (no signing identity)"

      # For signed releases, uncomment and configure:
      # - name: Import Certificate
      #   env:
      #     CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     security list-keychains -d user -s build.keychain

      # - name: Notarize
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #     TEAM_ID: ${{ secrets.TEAM_ID }}
      #   run: |
      #     xcrun notarytool submit build/export/Chaotic\ Jelly.app.zip \
      #       --apple-id "$APPLE_ID" \
      #       --password "$APPLE_PASSWORD" \
      #       --team-id "$TEAM_ID" \
      #       --wait

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Chaotic Jelly" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 190 \
            "ChaoticJelly-${{ github.ref_name }}.dmg" \
            "${{ env.PROJECT_DIR }}/build/ChaoticJelly.xcarchive/Products/Applications/" \
            || echo "DMG creation skipped"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChaoticJelly-${{ github.ref_name }}
          path: "*.dmg"

      # Uncomment for automatic release creation on tags:
      # - name: Create GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: softprops/action-gh-release@v1
      #   with:
      #     files: "*.dmg"
      #     draft: true
      #     generate_release_notes: true

  test:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run Tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild \
            -project ChaoticJelly.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            test \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
