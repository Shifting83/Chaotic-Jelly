name: ChaoticJelly
options:
  bundleIdPrefix: com.chaoticjelly
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_BUNDLE_IDENTIFIER: com.chaoticjelly.app
    MARKETING_VERSION: "0.3.8"
    CURRENT_PROJECT_VERSION: 15
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Resources/ChaoticJelly.entitlements

targets:
  ChaoticJelly:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/ChaoticJelly.help
      - path: Resources/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_NAME: Chaotic Jelly
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Chaotic Jelly
        CFBundleDisplayName: Chaotic Jelly
        CFBundleIdentifier: com.chaoticjelly.app
        CFBundleVersion: "15"
        CFBundleShortVersionString: "0.3.8"
        CFBundlePackageType: APPL
        CFBundleExecutable: Chaotic Jelly
        LSMinimumSystemVersion: "14.0"
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "Copyright 2026 Chaotic Jelly"
        CFBundleHelpBookName: Chaotic Jelly Help
        CFBundleHelpBookFolder: ChaoticJelly.help
        SUFeedURL: ""
        SUPublicEDKey: ""

  ChaoticJellyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ChaoticJellyTests
        type: group
    dependencies:
      - target: ChaoticJelly
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Chaotic Jelly.app/Contents/MacOS/Chaotic Jelly"

schemes:
  ChaoticJelly:
    build:
      targets:
        ChaoticJelly: all
        ChaoticJellyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChaoticJellyTests
    profile:
      config: Release
    archive:
      config: Release
